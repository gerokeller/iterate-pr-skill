# Dependabot version & security updates.
# Security updates activate automatically once this config is present and
# inherit the grouping, labels, and commit-message conventions below.
# Docs: https://docs.github.com/en/code-security/dependabot
#
# Coverage:
#   - pip: dev dependencies declared in pyproject.toml's
#     [project.optional-dependencies].dev (ruff, mypy).
#   - github-actions: workflow action pins (actions/checkout, setup-python, ...).
#
# Not scanned:
#   - PEP 723 inline script metadata in scripts/*.py. The bundled scripts have
#     no runtime deps today; add them to pyproject.toml if they grow any.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"
    groups:
      python-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
