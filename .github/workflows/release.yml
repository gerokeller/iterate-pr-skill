name: release

on:
  push:
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release version
        id: ver
        run: |
          set -euo pipefail
          current=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if git rev-parse -q --verify "refs/tags/v${current}" >/dev/null; then
            IFS=. read -r major minor patch <<< "$current"
            new="${major}.${minor}.$((patch + 1))"
            python - "$new" <<'PY'
          import json, re, sys
          new = sys.argv[1]
          p = ".claude-plugin/plugin.json"
          d = json.load(open(p))
          d["version"] = new
          open(p, "w").write(json.dumps(d, indent=2) + "\n")
          py = "pyproject.toml"
          s = open(py).read()
          s = re.sub(r'^version\s*=\s*"[^"]+"', f'version = "{new}"', s, count=1, flags=re.M)
          open(py, "w").write(s)
          PY
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "version=${new}" >> "$GITHUB_OUTPUT"
          else
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "version=${current}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit patch bump
        if: steps.ver.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json pyproject.toml
          git commit -m "chore(release): bump version to v${VERSION} [skip ci]"
          git push origin HEAD:master

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --target "$(git rev-parse HEAD)" \
            --title "v${VERSION}" \
            --generate-notes
